spring.application.name=FichaDePersonagemRPG

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver=${DATABASE_DRIVER}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=single
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.id.optimizer.placed_low_priority=true

spring.h2.console.enabled=true

spring.flyway.enable=true
spring.flyway.locations=classpath:db.migrations
spring.flyway.baseline-on-migrate=true

spring.jackson.deserialization.fail-on-null-for-primitives=false